<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="460" viewBox="0 0 1180 460" role="img" aria-labelledby="title desc">
  <title id="title">RTU Link</title>
  <desc id="desc">STM32 RTU legacy UART link to ESP32 MTU on GPIO39 and GPIO40.</desc>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".14"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#334155"/></marker><style>.bg{fill:#f8fafc}.title{font:700 30px Arial;fill:#0f172a}.card{fill:#fff;stroke:#d8e3ef;stroke-width:1.4;rx:18;filter:url(#shadow)}.label{font:700 18px Arial;fill:#0f172a}.small{font:400 14px Arial;fill:#475569}.tiny{font:400 12px Arial;fill:#64748b}.line{stroke:#334155;stroke-width:2.7;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2.3;stroke-dasharray:7 6;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="460" class="bg"/>
  <text x="54" y="58" class="title">STM32 RTU Link - Legacy Compatibility Path</text>
  <rect x="80" y="130" width="300" height="190" class="card"/><text x="115" y="176" class="label">STM32 Blue Pill RTU</text><text x="115" y="210" class="small">PA0-PA3 ADC</text><text x="115" y="235" class="tiny">tds, pressure, flow, level</text><text x="115" y="270" class="tiny">PA9 TX / PA10 RX</text>
  <rect x="800" y="130" width="300" height="190" class="card"/><text x="835" y="176" class="label">ESP32-S3 MTU</text><text x="835" y="210" class="small">Serial1 UART</text><text x="835" y="235" class="tiny">GPIO39 RX / GPIO40 TX</text><text x="835" y="270" class="tiny">CRC8 frame parser</text>
  <path d="M380 190 C520 160 660 160 798 190" class="line"/><text x="520" y="150" class="small">PA9 TX -> GPIO39 RX</text>
  <path d="M800 260 C660 300 520 300 382 260" class="line"/><text x="520" y="334" class="small">PA10 RX <- GPIO40 TX</text>
  <path d="M380 335 H800" class="dash"/><text x="555" y="366" class="tiny">Common GND, 3.3V UART only</text>
</svg>
