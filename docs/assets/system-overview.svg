<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AquaPuer System Overview</title>
  <desc id="desc">Architecture diagram showing station sensors, ESP32 MTU, STM32 RTU, web dashboard, and Python AI controller.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="mtu" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title{font:700 34px Arial, sans-serif;fill:#0f172a}
      .subtitle{font:400 17px Arial, sans-serif;fill:#475569}
      .label{font:700 19px Arial, sans-serif;fill:#0f172a}
      .small{font:400 14px Arial, sans-serif;fill:#475569}
      .tiny{font:400 12px Arial, sans-serif;fill:#64748b}
      .card{fill:#fff;stroke:#d8e3ef;stroke-width:1.5;rx:18;filter:url(#shadow)}
      .soft{fill:#f8fafc;stroke:#d9e7f2;stroke-width:1.2;rx:14}
      .line{stroke:#334155;stroke-width:2.6;fill:none;marker-end:url(#arrow)}
      .lineBlue{stroke:#2563eb;stroke-width:2.8;fill:none;marker-end:url(#arrowBlue)}
      .dash{stroke:#64748b;stroke-width:2.4;stroke-dasharray:8 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="64" y="64" class="title">AquaPuer Smart Water Station</text>
  <text x="64" y="94" class="subtitle">Current production data paths: MTU direct sensors, on-board dashboard, Python AI controller, and optional legacy RTU link.</text>

  <rect x="62" y="145" width="260" height="370" class="card"/>
  <text x="92" y="190" class="label">Station Hardware</text>
  <rect x="92" y="218" width="200" height="54" class="soft"/>
  <text x="112" y="241" class="small">Before filter</text>
  <text x="112" y="260" class="tiny">turb1, ph1, press1, flow1</text>
  <rect x="92" y="290" width="200" height="54" class="soft"/>
  <text x="112" y="313" class="small">After filter</text>
  <text x="112" y="332" class="tiny">turb2, ph2, press2, flow2</text>
  <rect x="92" y="362" width="200" height="54" class="soft"/>
  <text x="112" y="385" class="small">Optional sensors</text>
  <text x="112" y="404" class="tiny">temp1/temp2, pump_current</text>
  <rect x="92" y="434" width="200" height="54" class="soft"/>
  <text x="112" y="457" class="small">Actuators</text>
  <text x="112" y="476" class="tiny">pump, valve, status LED</text>

  <rect x="440" y="130" width="360" height="440" class="card"/>
  <rect x="440" y="130" width="360" height="78" rx="18" fill="url(#mtu)"/>
  <text x="475" y="177" style="font:700 27px Arial,sans-serif;fill:#fff">ESP32-S3 MTU</text>
  <text x="476" y="198" style="font:400 13px Arial,sans-serif;fill:#dbeafe">FreeRTOS edge controller</text>
  <rect x="475" y="236" width="290" height="52" class="soft"/>
  <text x="500" y="258" class="small">SensorManager</text>
  <text x="500" y="276" class="tiny">read once per control cycle</text>
  <rect x="475" y="306" width="290" height="52" class="soft"/>
  <text x="500" y="328" class="small">State machine + safety</text>
  <text x="500" y="346" class="tiny">pump, valve, emergency stop</text>
  <rect x="475" y="376" width="290" height="52" class="soft"/>
  <text x="500" y="398" class="small">HTTP REST + WebSocket :81</text>
  <text x="500" y="416" class="tiny">dashboard, status, control</text>
  <rect x="475" y="446" width="290" height="52" class="soft"/>
  <text x="500" y="468" class="small">USB serial JSON</text>
  <text x="500" y="486" class="tiny">telemetry and commands</text>
  <rect x="475" y="516" width="290" height="34" class="soft"/>
  <text x="500" y="538" class="small">Optional Edge Impulse inference</text>

  <rect x="900" y="120" width="270" height="145" class="card"/>
  <text x="930" y="162" class="label">Browser Dashboard</text>
  <text x="930" y="191" class="small">React/Vite served from LittleFS</text>
  <text x="930" y="216" class="tiny">http://192.168.4.1/</text>
  <text x="930" y="236" class="tiny">ws://192.168.4.1:81/</text>

  <rect x="900" y="330" width="270" height="165" class="card"/>
  <text x="930" y="372" class="label">Python AI Controller</text>
  <text x="930" y="401" class="small">Serial + MQTT + FastAPI</text>
  <text x="930" y="426" class="tiny">Dataset CSV logger</text>
  <text x="930" y="446" class="tiny">Camera/security monitor</text>
  <text x="930" y="466" class="tiny">http://localhost:5000</text>

  <rect x="900" y="560" width="270" height="95" class="card"/>
  <text x="930" y="600" class="label">STM32 RTU</text>
  <text x="930" y="627" class="tiny">Legacy optional path: tds, pressure, flow, level</text>

  <path d="M322 330 C360 330 390 330 438 330" class="lineBlue"/>
  <text x="346" y="316" class="tiny">direct sensor reads</text>
  <path d="M800 385 C840 350 858 205 898 196" class="lineBlue"/>
  <text x="812" y="261" class="tiny">HTTP / WS :81</text>
  <path d="M800 464 C844 464 856 420 898 414" class="lineBlue"/>
  <text x="812" y="450" class="tiny">USB serial JSON</text>
  <path d="M900 608 C845 608 840 536 802 520" class="dash"/>
  <text x="810" y="602" class="tiny">UART GPIO39/40</text>

  <rect x="64" y="604" width="734" height="50" rx="14" fill="#ecfeff" stroke="#bae6fd"/>
  <text x="88" y="636" style="font:700 15px Arial,sans-serif;fill:#0f172a">Dataset order:</text>
  <text x="205" y="636" class="small">turb1, turb2, ph1, ph2, flow1, flow2, press1, press2, temp1, temp2, pump_current</text>
</svg>
