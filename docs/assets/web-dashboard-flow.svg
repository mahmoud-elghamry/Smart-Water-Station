<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">Web Dashboard Build and Runtime Flow</title>
  <desc id="desc">Diagram showing React Vite source, ESP32 build copy, LittleFS upload, and browser runtime connections.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#334155"/></marker>
    <style>.bg{fill:#f9fbff}.title{font:700 30px Arial;fill:#0f172a}.card{fill:#fff;stroke:#d8e3ef;stroke-width:1.4;rx:18;filter:url(#shadow)}.label{font:700 18px Arial;fill:#0f172a}.small{font:400 14px Arial;fill:#475569}.tiny{font:400 12px Arial;fill:#64748b}.line{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.accent{fill:#eef2ff;stroke:#c7d2fe;rx:12}</style>
  </defs>
  <rect width="1180" height="560" class="bg"/>
  <text x="54" y="58" class="title">Web Dashboard Build and Runtime Flow</text>
  <rect x="54" y="120" width="220" height="130" class="card"/>
  <text x="84" y="164" class="label">React/Vite Source</text>
  <text x="84" y="194" class="small">app/, components, hooks</text>
  <text x="84" y="217" class="tiny">npm run dev / build</text>

  <rect x="354" y="120" width="240" height="130" class="card"/>
  <text x="384" y="164" class="label">build:esp32</text>
  <text x="384" y="194" class="small">tsc + vite build</text>
  <text x="384" y="217" class="tiny">copy-dist-to-platformio.cjs</text>

  <rect x="674" y="120" width="220" height="130" class="card"/>
  <text x="704" y="164" class="label">MTU data/</text>
  <text x="704" y="194" class="small">LittleFS files</text>
  <text x="704" y="217" class="tiny">gzip assets included</text>

  <rect x="954" y="120" width="190" height="130" class="card"/>
  <text x="984" y="164" class="label">ESP32 Flash</text>
  <text x="984" y="194" class="small">uploadfs</text>
  <text x="984" y="217" class="tiny">then upload firmware</text>

  <rect x="210" y="350" width="260" height="120" class="card"/>
  <text x="240" y="394" class="label">Browser</text>
  <text x="240" y="424" class="small">http://192.168.4.1/</text>
  <text x="240" y="447" class="tiny">dashboard UI</text>

  <rect x="710" y="340" width="260" height="140" class="card"/>
  <text x="740" y="382" class="label">ESP32 WebDashboard</text>
  <rect x="740" y="402" width="190" height="28" class="accent"/><text x="756" y="421" class="tiny">REST /api/status</text>
  <rect x="740" y="438" width="190" height="28" class="accent"/><text x="756" y="457" class="tiny">WebSocket :81</text>

  <path d="M274 185 H352" class="line"/>
  <path d="M594 185 H672" class="line"/>
  <path d="M894 185 H952" class="line"/>
  <path d="M1048 250 C1048 315 974 349 970 383" class="line"/>
  <path d="M710 410 C620 410 565 410 472 410" class="line"/>
  <path d="M470 438 C560 500 630 494 710 448" class="line"/>
  <text x="520" y="392" class="tiny">status JSON</text>
  <text x="520" y="502" class="tiny">commands</text>
</svg>
